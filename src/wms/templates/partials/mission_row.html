<tr id="mission-row-{{ mission.id }}">
    <td class="whitespace-nowrap py-4 pl-4 pr-3 text-sm font-medium text-gray-900">{{ mission.text }}</td>
    <td class="whitespace-nowrap px-3 py-4 text-sm text-gray-500">{{ mission.category }}</td>
    <td class="whitespace-nowrap px-3 py-4 text-sm text-gray-500">{{ mission.difficulty }}</td>
    <td class="whitespace-nowrap px-3 py-4 text-sm">
        <form hx-patch="/dashboard/mission/{{ mission.id }}/status" hx-target="#mission-row-{{ mission.id }}" hx-swap="outerHTML" class="inline">
            <select name="status" onchange="this.form.dispatchEvent(new Event('submit'))" class="mt-1 block w-full rounded-md border-gray-300 py-1.5 pl-3 pr-10 text-gray-900 ring-1 ring-inset ring-gray-300 focus:ring-2 focus:ring-brand-600 sm:text-sm sm:leading-6">
                <option value="DRAFT" {% if mission.status == 'DRAFT' %}selected{% endif %}>DRAFT</option>
                <option value="APPROVED" {% if mission.status == 'APPROVED' %}selected{% endif %}>APPROVED</option>
                <option value="PRINTED" {% if mission.status == 'PRINTED' %}selected{% endif %}>PRINTED</option>
                <option value="RETIRED" {% if mission.status == 'RETIRED' %}selected{% endif %}>RETIRED</option>
            </select>
        </form>
    </td>
    <td class="relative whitespace-nowrap py-4 pl-3 pr-4 text-right text-sm font-medium sm:pr-0">
        <button hx-delete="/dashboard/mission/{{ mission.id }}" hx-target="#mission-row-{{ mission.id }}" hx-swap="outerHTML" class="text-red-600 hover:text-red-900">Delete</button>
    </td>
</tr>
