{% extends "base.html" %}

{% block title %}Dashboard - Wildcard Management System{% endblock %}

{% block content %}
<div class="sm:flex sm:items-center">
    <div class="sm:flex-auto">
        <h1 class="text-base font-semibold leading-6 text-gray-900">Idea Dashboard</h1>
        <p class="mt-2 text-sm text-gray-700">A list of all prompts in your system including their category, difficulty, and status.</p>
    </div>
    <div class="mt-4 sm:ml-16 sm:mt-0 sm:flex-none">
        <button onclick="document.getElementById('add-prompt-modal').classList.remove('hidden')" type="button" class="block rounded-md bg-brand-600 px-3 py-2 text-center text-sm font-semibold text-white shadow-sm hover:bg-brand-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-brand-600">Add Prompt</button>
    </div>
</div>

<div class="mt-8 flex gap-4">
    <!-- Filters -->
    <form hx-get="/dashboard" hx-target="#prompt-table-container" hx-push-url="true" class="flex gap-4 items-end">
        <div>
            <label for="status" class="block text-sm font-medium leading-6 text-gray-900">Status</label>
            <select name="status" id="status" class="mt-2 block w-full rounded-md border-0 py-1.5 pl-3 pr-10 text-gray-900 ring-1 ring-inset ring-gray-300 focus:ring-2 focus:ring-brand-600 sm:text-sm sm:leading-6">
                <option value="">All</option>
                <option value="DRAFT" {% if current_status == 'DRAFT' %}selected{% endif %}>DRAFT</option>
                <option value="APPROVED" {% if current_status == 'APPROVED' %}selected{% endif %}>APPROVED</option>
                <option value="PRINTED" {% if current_status == 'PRINTED' %}selected{% endif %}>PRINTED</option>
                <option value="RETIRED" {% if current_status == 'RETIRED' %}selected{% endif %}>RETIRED</option>
            </select>
        </div>
        <div>
            <label for="category" class="block text-sm font-medium leading-6 text-gray-900">Category</label>
            <select name="category" id="category" class="mt-2 block w-full rounded-md border-0 py-1.5 pl-3 pr-10 text-gray-900 ring-1 ring-inset ring-gray-300 focus:ring-2 focus:ring-brand-600 sm:text-sm sm:leading-6">
                <option value="">All</option>
                {% for cat in categories %}
                <option value="{{ cat }}" {% if current_category == cat %}selected{% endif %}>{{ cat }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="rounded-md bg-white px-3 py-2 text-sm font-semibold text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 hover:bg-gray-50">Filter</button>
    </form>
</div>

<div class="mt-8 flow-root">
    <div class="-mx-4 -my-2 overflow-x-auto sm:-mx-6 lg:-mx-8">
        <div class="inline-block min-w-full py-2 align-middle sm:px-6 lg:px-8">
            <div id="prompt-table-container" class="overflow-hidden shadow ring-1 ring-black ring-opacity-5 sm:rounded-lg bg-white">
                {% include 'partials/prompt_table.html' %}
            </div>
        </div>
    </div>
</div>

<!-- Add Prompt Modal -->
<div id="add-prompt-modal" class="hidden relative z-10" aria-labelledby="modal-title" role="dialog" aria-modal="true">
    <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity"></div>
    <div class="fixed inset-0 z-10 w-screen overflow-y-auto">
        <div class="flex min-h-full items-end justify-center p-4 text-center sm:items-center sm:p-0">
            <div class="relative transform overflow-hidden rounded-lg bg-white px-4 pb-4 pt-5 text-left shadow-xl transition-all sm:my-8 sm:w-full sm:max-w-lg sm:p-6">
                <form hx-post="/dashboard/prompt" hx-target="#prompt-table-container" onsubmit="document.getElementById('add-prompt-modal').classList.add('hidden'); this.reset();">
                    <div>
                        <h3 class="text-base font-semibold leading-6 text-gray-900" id="modal-title">Add New Prompt</h3>
                        <div class="mt-4">
                            <label for="text" class="block text-sm font-medium leading-6 text-gray-900">Prompt Text</label>
                            <input type="text" name="text" id="text" required class="mt-2 block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-brand-600 sm:text-sm sm:leading-6">
                        </div>
                        <div class="mt-4">
                            <label for="category" class="block text-sm font-medium leading-6 text-gray-900">Category</label>
                            <input type="text" name="category" id="category" required class="mt-2 block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 focus:ring-2 focus:ring-inset focus:ring-brand-600 sm:text-sm sm:leading-6">
                        </div>
                        <div class="mt-4">
                            <label for="difficulty" class="block text-sm font-medium leading-6 text-gray-900">Difficulty (1-3)</label>
                            <input type="number" name="difficulty" id="difficulty" min="1" max="3" required class="mt-2 block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 focus:ring-2 focus:ring-inset focus:ring-brand-600 sm:text-sm sm:leading-6">
                        </div>
                    </div>
                    <div class="mt-5 sm:mt-6 sm:grid sm:grid-flow-row-dense sm:grid-cols-2 sm:gap-3">
                        <button type="submit" class="inline-flex w-full justify-center rounded-md bg-brand-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-brand-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-brand-600 sm:col-start-2">Add</button>
                        <button type="button" onclick="document.getElementById('add-prompt-modal').classList.add('hidden')" class="mt-3 inline-flex w-full justify-center rounded-md bg-white px-3 py-2 text-sm font-semibold text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 hover:bg-gray-50 sm:col-start-1 sm:mt-0">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
